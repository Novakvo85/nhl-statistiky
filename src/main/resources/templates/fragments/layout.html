<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<!--/player-detail a /team mají vlastní <head> | pokud proběhne úprava, upravit i tam-->
<head th:fragment="head(title)">
    <meta charset="UTF-8" >
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' | NHL Statistiky'">NHL Statistiky</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>

<body>

<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
        <a class="navbar-brand" href="/">NHL Statistiky</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/games">Zápasy</a></li>
                <li class="nav-item"><a class="nav-link" href="/standings">Tabulka</a></li>
                <li class="nav-item"><a class="nav-link" href="/teams">Týmy</a></li>
                <li class="nav-item"><a class="nav-link" href="/players">Hráči</a></li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                        Statistiky hráčů
                    </a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="/statistics/skaters">Hráči v poli</a></li>
                        <li><a class="dropdown-item" href="/statistics/goalies">Brankáři</a></li>
                    </ul>
                </li>
                <li sec:authorize="hasRole('ADMIN')" class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                        <i class="bi bi-gear"></i> Admin
                    </a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="/admin/import">Import dat</a></li>
                        <li><a class="dropdown-item" href="/admin/users">Uživatelé</a></li>
                    </ul>
                </li>
            </ul>
            <ul class="navbar-nav ms-auto">
                <li sec:authorize="isAnonymous()" class="nav-item">
                    <a class="nav-link" href="/login"><i class="bi bi-box-arrow-in-right"></i> Přihlášení</a>
                </li>
                <li sec:authorize="isAuthenticated()" class="nav-item">
                    <a class="nav-link" href="/profile"><i class="bi bi-person"></i> Profil</a>
                </li>
                <li sec:authorize="isAuthenticated()" class="nav-item">
                    <form th:action="@{/logout}" method="post" style="display:inline;">
                        <button type="submit" class="nav-link btn btn-link px-0" style="color:#fff;">
                            <i class="bi bi-box-arrow-right"></i> Odhlásit se
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>


<footer th:fragment="footer" class="site-footer mt-5">
    <div class="container text-center">
        <p class="mb-1">
            <i class="bi bi-hockey-puck"></i>Webová aplikace pro ukládání sportovních statistik - Bakalářská práce
        </p>
        <p class="mb-1 text-muted small">
            Vojtěch Novák &copy; 2026
        </p>
        <p class="mb-0 text-muted small">
            Data poskytována <a href="https://api-web.nhle.com" target="_blank" class="footer-link">NHL API</a>
        </p>
    </div>
</footer>

</body>
</html>
