<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="cs">
<head th:replace="~{fragments/layout :: head('Tabulka')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">
    <div class="main-card mx-auto">
        <h1 class="mb-3 text-center"><i class="bi bi-trophy"></i> Tabulka</h1>

        <form method="get" class="season-select mb-4">
            <label for="season" class="form-label"><i class="bi bi-calendar2-week"></i> Vyberte sezónu</label>
            <select id="season" name="season" class="form-select" onchange="this.form.submit()">
                <option th:each="season : ${seasons}"
                        th:value="${season.id}"
                        th:text="${season.startYear} + ' - ' + ${season.endYear}"
                        th:selected="${season.id == selectedSeasonId}">
                </option>
            </select>
            <input type="hidden" name="sortBy" th:value="${sortBy}">
            <input type="hidden" name="direction" th:value="${direction}">
        </form>

        <div class="table-responsive">
            <table class="table table-striped align-middle mb-0 shadow-sm">
                <thead class="table-primary">
                <tr>
                    <th>#</th>
                    <th>Tým</th>

                    <th class="text-center" th:classappend="${sortBy == 'matches' ? ' active-sort' : ''}">
                        <a th:href="@{/standings(season=${selectedSeasonId}, sortBy='matches',
                                direction=${sortBy == 'matches' and direction == 'asc' ? 'desc' : (sortBy != 'matches' ? 'desc' : 'asc')})}"
                           title="Zápasy">
                            Z
                            <i th:if="${sortBy == 'matches'}"
                               th:classappend="${direction == 'asc' ? 'bi bi-arrow-up' : 'bi bi-arrow-down'}"></i>
                        </a>
                    </th>

                    <th class="text-center" th:classappend="${sortBy == 'wins' ? ' active-sort' : ''}">
                        <a th:href="@{/standings(season=${selectedSeasonId}, sortBy='wins',
                                direction=${sortBy == 'wins' and direction == 'asc' ? 'desc' : (sortBy != 'wins' ? 'desc' : 'asc')})}"
                           title="Výhry">
                            V
                            <i th:if="${sortBy == 'wins'}"
                               th:classappend="${direction == 'asc' ? 'bi bi-arrow-up' : 'bi bi-arrow-down'}"></i>
                        </a>
                    </th>

                    <th class="text-center" th:classappend="${sortBy == 'losses' ? ' active-sort' : ''}">
                        <a th:href="@{/standings(season=${selectedSeasonId}, sortBy='losses',
                                direction=${sortBy == 'losses' and direction == 'asc' ? 'desc' : (sortBy != 'losses' ? 'desc' : 'asc')})}"
                           title="Prohry">
                            P
                            <i th:if="${sortBy == 'losses'}"
                               th:classappend="${direction == 'asc' ? 'bi bi-arrow-up' : 'bi bi-arrow-down'}"></i>
                        </a>
                    </th>

                    <th class="text-center" th:classappend="${sortBy == 'overtimeLosses' ? ' active-sort' : ''}">
                        <a th:href="@{/standings(season=${selectedSeasonId}, sortBy='overtimeLosses',
                                direction=${sortBy == 'overtimeLosses' and direction == 'asc' ? 'desc' : (sortBy != 'overtimeLosses' ? 'desc' : 'asc')})}"
                           title="Prohry v prodloužení">
                            PP
                            <i th:if="${sortBy == 'overtimeLosses'}"
                               th:classappend="${direction == 'asc' ? 'bi bi-arrow-up' : 'bi bi-arrow-down'}"></i>
                        </a>
                    </th>

                    <th class="text-center" th:classappend="${sortBy == 'points' ? ' active-sort' : ''}">
                        <a th:href="@{/standings(season=${selectedSeasonId}, sortBy='points',
                                direction=${sortBy == 'points' and direction == 'asc' ? 'desc' : (sortBy != 'points' ? 'desc' : 'asc')})}"
                           title="Body">
                            Body
                            <i th:if="${sortBy == 'points'}"
                               th:classappend="${direction == 'asc' ? 'bi bi-arrow-up' : 'bi bi-arrow-down'}"></i>
                        </a>
                    </th>

                    <th class="text-center" th:classappend="${sortBy == 'pointPctg' ? ' active-sort' : ''}">
                        <a th:href="@{/standings(season=${selectedSeasonId}, sortBy='pointPctg',
                                direction=${sortBy == 'pointPctg' and direction == 'asc' ? 'desc' : (sortBy != 'pointPctg' ? 'desc' : 'asc')})}"
                           title="Procento bodů">
                            %
                            <i th:if="${sortBy == 'pointPctg'}"
                               th:classappend="${direction == 'asc' ? 'bi bi-arrow-up' : 'bi bi-arrow-down'}"></i>
                        </a>
                    </th>

                    <th class="text-center" th:classappend="${sortBy == 'goalsFor' ? ' active-sort' : ''}">
                        <a th:href="@{/standings(season=${selectedSeasonId}, sortBy='goalsFor',
                                direction=${sortBy == 'goalsFor' and direction == 'asc' ? 'desc' : (sortBy != 'goalsFor' ? 'desc' : 'asc')})}"
                           title="Vstřelené góly">
                            VG
                            <i th:if="${sortBy == 'goalsFor'}"
                               th:classappend="${direction == 'asc' ? 'bi bi-arrow-up' : 'bi bi-arrow-down'}"></i>
                        </a>
                    </th>

                    <th class="text-center" th:classappend="${sortBy == 'goalsAgainst' ? ' active-sort' : ''}">
                        <a th:href="@{/standings(season=${selectedSeasonId}, sortBy='goalsAgainst',
                                direction=${sortBy == 'goalsAgainst' and direction == 'asc' ? 'desc' : (sortBy != 'goalsAgainst' ? 'desc' : 'asc')})}"
                           title="Obdržené góly">
                            OG
                            <i th:if="${sortBy == 'goalsAgainst'}"
                               th:classappend="${direction == 'asc' ? 'bi bi-arrow-up' : 'bi bi-arrow-down'}"></i>
                        </a>
                    </th>

                    <th class="text-center" title="Rozdíl gólů">+/-</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="standing, iter : ${standings}">
                    <td th:text="${iter.index + 1}">1</td>
                    <td>
                        <a th:href="@{/teams/{id}(id=${standing.teamSeason.team.id}, season=${selectedSeasonId})}"
                           class="team-name"
                           th:text="${standing.teamSeason.team.name}">Team Name</a>
                    </td>
                    <td class="text-center" th:text="${standing.matches}"></td>
                    <td class="text-center" th:text="${standing.wins}"></td>
                    <td class="text-center" th:text="${standing.losses}"></td>
                    <td class="text-center" th:text="${standing.overtimeLosses}"></td>
                    <td class="text-center"><strong th:text="${standing.points}"></strong></td>
                    <td class="text-center" th:text="${#numbers.formatDecimal(standing.pointPctg, 1, 3)}"></td>
                    <td class="text-center" th:text="${standing.goalsFor}"></td>
                    <td class="text-center" th:text="${standing.goalsAgainst}"></td>
                    <td class="text-center" th:text="${standing.goalsFor - standing.goalsAgainst}"></td>
                </tr>
                </tbody>
            </table>
        </div>
        <p class="text-muted small mt-2">
            <i class="bi bi-info-circle"></i> Některé statistiky nemusí být ve starších sezónách zaznamenány.
        </p>
        <div th:if="${standings.isEmpty()}" class="alert alert-info mt-4 text-center">
            <i class="bi bi-info-circle"></i> Pro tuto sezónu zatím nejsou k dispozici žádné statistiky.
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
