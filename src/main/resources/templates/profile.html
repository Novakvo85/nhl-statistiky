<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="cs">
<head th:replace="~{fragments/layout :: head('Profil')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">
    <div class="main-card mx-auto">
        <h1 class="mb-4 text-center"><i class="bi bi-person-circle"></i> Můj profil</h1>

        <div class="row">

            <div class="col-md-6">
                <h4 class="mb-3 text-center"><i class="bi bi-pencil-fill"></i> Upravit profil</h4>
                <form th:action="@{/profile}" th:object="${user}" method="post">
                    <div class="mb-3">
                        <label for="username" class="form-label">Uživatelské jméno</label>
                        <input id="username" type="text" class="form-control" th:field="*{username}" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input id="email" type="email" class="form-control" th:field="*{email}" required>
                    </div>
                    <div class="mb-3">
                        <label for="newPassword" class="form-label">Nové heslo</label>
                        <input id="newPassword" type="password" class="form-control" name="newPassword" placeholder="Pokud neměníš, nech prázdné">
                    </div>
                    <div class="mb-3">
                        <label for="oldPassword" class="form-label">Staré heslo (pro potvrzení změn)</label>
                        <input id="oldPassword" type="password" class="form-control" name="oldPassword" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Uložit změny</button>
                    </div>
                    <div th:if="${error}" class="alert alert-danger mt-3" th:text="${error}"></div>
                    <div th:if="${success}" class="alert alert-success mt-3" th:text="${success}"></div>
                </form>
            </div>

            <div class="col-md-6">
                <h4 class="mb-3 text-center"><i class="bi bi-star-fill text-warning"></i> Oblíbené týmy</h4>
                <div class="favorite-btns">
                    <div th:each="team : ${user.getFavoriteTeams()}" class="mb-2">
                        <form th:action="@{/profile/dropFavorite/{id}(id=${team.id})}" method="post" class="d-flex align-items-center justify-content-between">
                            <a th:href="@{/teams/{id}(id=${team.id})}" th:text="${team.name}" class="fw-500"></a>
                            <button type="submit" class="btn btn-danger btn-sm">
                                <i class="bi bi-star-fill"></i> Odebrat
                            </button>
                        </form>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
