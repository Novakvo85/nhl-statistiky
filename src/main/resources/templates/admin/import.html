<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="cs">
<head th:replace="~{fragments/layout :: head('Import sezón')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">
    <div class="main-card mx-auto">
        <h1 class="mb-4 text-center"><i class="bi bi-cloud-download-fill"></i> Import sezón</h1>

        <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle-fill"></i> <span th:text="${message}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-triangle-fill"></i> <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <form method="get" class="season-select mb-4">
            <label for="competition" class="form-label"><i class="bi bi-trophy"></i> Vyberte soutěž</label>
            <select id="competition" name="competitionName" class="form-select" onchange="this.form.submit()">
                <option th:each="competition : ${competitions}"
                        th:value="${competition.name}"
                        th:text="${competition.name}"
                        th:selected="${competition == selectedCompetition}">
                </option>
            </select>
        </form>

        <h4 class="mb-3"><i class="bi bi-plus-circle-fill"></i> Importovat novou sezónu</h4>
        <form th:action="@{/admin/import/importSeason}" method="post" class="row g-2 align-items-end mb-4"
              onsubmit="return confirmImport(document.getElementById('seasonStart').value + '-' + document.getElementById('seasonEnd').value);">
            <div class="col-auto">
                <label for="seasonStart" class="form-label">Rok startu</label>
                <input id="seasonStart" type="number" class="form-control" th:name="seasonStart" placeholder="např. 2023" required/>
            </div>
            <div class="col-auto">
                <label for="seasonEnd" class="form-label">Rok konce</label>
                <input id="seasonEnd" type="number" class="form-control" th:name="seasonEnd" placeholder="např. 2024" required/>
            </div>
            <input type="hidden" th:name="competitionName" th:value="${selectedCompetition.name}"/>
            <div class="col-auto">
                <button type="submit" class="btn btn-primary"><i class="bi bi-download"></i> Importovat</button>
            </div>
        </form>

        <hr class="mb-4">

        <h4 class="mb-2"><i class="bi bi-arrow-clockwise"></i> Aktualizace zápasů</h4>
        <p class="text-muted mb-3">Aktualizuje nově odehrané zápasy (skóre, statistiky hráčů, statistiky týmů).</p>

        <div class="d-flex gap-3 align-items-end flex-wrap mb-2">
            <form th:action="@{/admin/import/updateGames}" method="post" class="d-flex gap-2 align-items-end"
                  onsubmit="return confirmUpdate('days');">
                <div>
                    <label for="daysBack" class="form-label">Počet dní zpětně</label>
                    <input id="daysBack" type="number" class="form-control" style="width: 100px;" th:name="daysBack" value="3" min="1" max="30"/>
                </div>
                <button type="submit" class="btn btn-outline-primary"><i class="bi bi-calendar-range"></i> Aktualizovat poslední dny</button>
            </form>

            <form th:action="@{/admin/import/updateEntireSeason}" method="post"
                  onsubmit="return confirmUpdate('season');">
                <button type="submit" class="btn btn-outline-warning"><i class="bi bi-arrow-repeat"></i> Aktualizovat celou sezónu</button>
            </form>
        </div>
        <p class="text-muted mb-4">
            <small>
                <i class="bi bi-clock"></i> Automatická aktualizace probíhá <strong>každý den v 8:00</strong> (poslední 3 dny).<br>
                Aktualizace hráčů probíhá každý den v 8:30.
            </small>
        </p>

        <hr class="mb-4">

        <h4 class="mb-3"><i class="bi bi-list-ul"></i> Importované sezóny</h4>
        <div class="table-responsive">
            <table class="table table-striped align-middle mb-0 shadow-sm">
                <thead class="table-primary">
                <tr>
                    <th>Sezóna</th>
                    <th class="text-center">Importováno</th>
                    <th class="text-center">Akce</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="status : ${seasonStatuses}">
                    <td th:text="${status.season.startYear} + ' - ' + ${status.season.endYear}"></td>
                    <td class="text-center">
                        <span th:if="${status.imported}" class="badge bg-success"><i class="bi bi-check-circle"></i> Ano</span>
                        <span th:unless="${status.imported}" class="badge bg-secondary"><i class="bi bi-x-circle"></i> Ne</span>
                    </td>
                    <td class="text-center">
                        <form th:action="@{/admin/import/reimportSeason}" method="post" style="display:inline;"
                              th:onsubmit="'return confirmReimport(\'' + ${status.season.startYear} + '-' + ${status.season.endYear} + '\');'">
                            <input type="hidden" th:name="seasonId" th:value="${status.season.id}"/>
                            <button type="submit" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-counterclockwise"></i> Znovu importovat</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    function confirmImport(seasonName) {
        return confirm('Opravdu chcete importovat sezónu ' + seasonName + '? Tento proces může trvat několik minut.');
    }
    function confirmReimport(seasonName) {
        return confirm('Opravdu chcete znovu importovat sezónu ' + seasonName + '? Existující data budou aktualizována.');
    }
    function confirmUpdate(type) {
        if (type === 'days') {
            var days = document.getElementById('daysBack').value;
            return confirm('Opravdu chcete aktualizovat zápasy z posledních ' + days + ' dní?');
        } else {
            return confirm('Opravdu chcete aktualizovat CELOU sezónu? Tento proces může trvat dlouho.');
        }
    }
</script>
</body>
</html>
