<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="cs">
<head th:replace="~{fragments/layout :: head('Uživatelé')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">
    <div class="main-card mx-auto">
        <h1 class="mb-4 text-center"><i class="bi bi-people-fill"></i> Uživatelé</h1>

        <div th:if="${message}" class="alert alert-success mb-3">
            <i class="bi bi-check-circle"></i> <span th:text="${message}"></span>
        </div>
        <div th:if="${error}" class="alert alert-danger mb-3">
            <i class="bi bi-exclamation-triangle"></i> <span th:text="${error}"></span>
        </div>

        <div class="table-responsive">
            <table class="table table-striped align-middle mb-0 shadow-sm">
                <thead class="table-primary">
                <tr>
                    <th>ID</th>
                    <th>Uživatelské jméno</th>
                    <th>Role</th>
                    <th class="text-center">Akce</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="user : ${users}">
                    <td th:text="${user.id}"></td>
                    <td th:text="${user.username}"></td>
                    <td><span class="badge bg-secondary" th:text="${user.role}"></span></td>
                    <td class="text-center">
                        <form th:action="@{/admin/users/delete/{id}(id=${user.id})}" method="post" style="display:inline;">
                            <button type="submit"
                                    class="btn btn-danger btn-sm"
                                    th:data-username="${user.username}"
                                    onclick="return confirm('Opravdu chcete smazat uživatele ' + this.dataset.username + '? Tato akce je nevratná.');">
                                <i class="bi bi-trash"></i> Smazat
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
