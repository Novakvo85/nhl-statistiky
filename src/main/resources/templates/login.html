<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="cs">
<head th:replace="~{fragments/layout :: head('Přihlášení')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">
    <div class="main-card mx-auto">
        <i class="bi bi-person-circle login-icon"></i>
        <h2 class="mb-4 text-center">Přihlášení</h2>
        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label for="username" class="form-label">Uživatelské jméno</label>
                <input type="text" class="form-control" id="username" name="username" required autofocus>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Heslo</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            <div class="d-grid">
                <button type="submit" class="btn btn-primary">Přihlásit se</button>
            </div>
        </form>
        <div th:if="${param.error}" class="alert alert-danger mt-3" role="alert">
            Neplatné uživatelské jméno nebo heslo.
        </div>
        <div th:if="${param.logout}" class="alert alert-success mt-3">
            Byl jste úspěšně odhlášen.
        </div>
        <div class="mt-3 text-center">
            <span>Nemáte účet? <a href="/register">Registrujte se</a></span>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
