<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="cs">
<head th:replace="~{fragments/layout :: head('Brankáři')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">
    <div class="main-card mx-auto">
        <h1 class="mb-3 text-center"><i class="bi bi-shield-fill"></i> Brankáři</h1>

        <form method="get" class="season-select mb-4">
            <label for="season" class="form-label"><i class="bi bi-calendar2-week"></i> Vyberte sezónu</label>
            <select id="season" name="season" class="form-select" onchange="this.form.submit()">
                <option th:each="s : ${seasons}"
                        th:value="${s.id}"
                        th:text="${s.startYear} + ' - ' + ${s.endYear}"
                        th:selected="${s.id == selectedSeason.id}">
                </option>
            </select>
            <input type="hidden" name="sortBy" th:value="${sortBy}">
            <input type="hidden" name="direction" th:value="${direction}">
        </form>

        <div th:if="${error}" class="alert alert-warning" th:text="${error}"></div>

        <div class="table-responsive" th:if="${goalies != null and !goalies.isEmpty()}">
            <table class="table table-striped align-middle mb-0 shadow-sm">
                <thead class="table-primary">
                <tr>
                    <th>#</th>
                    <th>Brankář</th>
                    <th>Tým</th>

                    <th class="text-center" th:classappend="${sortBy == 'gamesPlayed' ? 'active-sort' : ''}">
                        <a th:href="@{/statistics/goalies(season=${selectedSeason.id}, page=0, sortBy='gamesPlayed',
                                direction=${sortBy == 'gamesPlayed' and direction == 'asc' ? 'desc' : (sortBy != 'gamesPlayed' ? 'desc' : 'asc')})}">
                            <span title="Zápasy">Z</span>
                            <i th:if="${sortBy == 'gamesPlayed'}"
                               th:classappend="${direction == 'asc' ? 'bi bi-arrow-up' : 'bi bi-arrow-down'}"></i>
                        </a>
                    </th>

                    <th class="text-center" th:classappend="${sortBy == 'shotsAgainst' ? 'active-sort' : ''}">
                        <a th:href="@{/statistics/goalies(season=${selectedSeason.id}, page=0, sortBy='shotsAgainst',
                                direction=${sortBy == 'shotsAgainst' and direction == 'asc' ? 'desc' : (sortBy != 'shotsAgainst' ? 'desc' : 'asc')})}">
                            <span title="Střely proti">SP</span>
                            <i th:if="${sortBy == 'shotsAgainst'}"
                               th:classappend="${direction == 'asc' ? 'bi bi-arrow-up' : 'bi bi-arrow-down'}"></i>
                        </a>
                    </th>

                    <th class="text-center" th:classappend="${sortBy == 'goalsAgainst' ? 'active-sort' : ''}">
                        <a th:href="@{/statistics/goalies(season=${selectedSeason.id}, page=0, sortBy='goalsAgainst',
                                direction=${sortBy == 'goalsAgainst' and direction == 'asc' ? 'desc' : (sortBy != 'goalsAgainst' ? 'desc' : 'asc')})}">
                            <span title="Obdržené góly">OG</span>
                            <i th:if="${sortBy == 'goalsAgainst'}"
                               th:classappend="${direction == 'asc' ? 'bi bi-arrow-up' : 'bi bi-arrow-down'}"></i>
                        </a>
                    </th>

                    <th class="text-center" th:classappend="${sortBy == 'savePctg' ? 'active-sort' : ''}">
                        <a th:href="@{/statistics/goalies(season=${selectedSeason.id}, page=0, sortBy='savePctg',
                                direction=${sortBy == 'savePctg' and direction == 'asc' ? 'desc' : (sortBy != 'savePctg' ? 'desc' : 'asc')})}">
                            <span title="Úspěšnost zákroků">ÚZ%</span>
                            <i th:if="${sortBy == 'savePctg'}"
                               th:classappend="${direction == 'asc' ? 'bi bi-arrow-up' : 'bi bi-arrow-down'}"></i>
                        </a>
                    </th>

                    <th class="text-center" th:classappend="${sortBy == 'gaa' ? 'active-sort' : ''}">
                        <a th:href="@{/statistics/goalies(season=${selectedSeason.id}, page=0, sortBy='gaa',
                                direction=${sortBy == 'gaa' and direction == 'asc' ? 'desc' : (sortBy != 'gaa' ? 'desc' : 'asc')})}">
                            <span title="Průměr obdržených gólů na zápas">POG</span>
                            <i th:if="${sortBy == 'gaa'}"
                               th:classappend="${direction == 'asc' ? 'bi bi-arrow-up' : 'bi bi-arrow-down'}"></i>
                        </a>
                    </th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="goalie, iterStat : ${goalies}">
                    <td th:text="${currentPage * 50 + iterStat.count}" class="text-muted"></td>
                    <td>
                        <a th:href="@{/players/{id}(id=${goalie.player.id})}"
                           class="text-decoration-none fw-semibold"
                           th:text="${goalie.player.firstName} + ' ' + ${goalie.player.lastName}">
                        </a>
                    </td>
                    <td>
                        <a th:if="${goalie.team != null}"
                           th:href="@{/teams/{id}(id=${goalie.team.id}, season=${selectedSeason.id})}"
                           class="text-decoration-none"
                           th:text="${goalie.team.name}">
                        </a>
                        <span th:if="${goalie.team == null}">-</span>
                    </td>
                    <td class="text-center" th:text="${goalie.gamesPlayed}"></td>
                    <td class="text-center" th:text="${goalie.shotsAgainst}"></td>
                    <td class="text-center" th:text="${goalie.goalsAgainst}"></td>
                    <td class="text-center" th:text="${#numbers.formatDecimal(goalie.savePctg * 100, 1, 1) + '%'}"></td>
                    <td class="text-center fw-bold" th:text="${#numbers.formatDecimal(goalie.gaa, 1, 2)}"></td>
                </tr>
                </tbody>
            </table>
        </div>

        <nav th:if="${totalPages > 1}" class="mt-3">
            <ul class="pagination justify-content-center flex-wrap">

                <li class="page-item" th:classappend="${currentPage == 0 ? 'disabled' : ''}">
                    <a class="page-link"
                       th:href="@{/statistics/goalies(season=${selectedSeason.id}, page=${currentPage - 1}, sortBy=${sortBy}, direction=${direction})}">
                        &laquo;
                    </a>
                </li>

                <li th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                    class="page-item"
                    th:classappend="${i == currentPage ? 'active' : ''}">
                    <a class="page-link"
                       th:href="@{/statistics/goalies(season=${selectedSeason.id}, page=${i}, sortBy=${sortBy}, direction=${direction})}"
                       th:text="${i + 1}">
                    </a>
                </li>

                <li class="page-item" th:classappend="${currentPage == totalPages - 1 ? 'disabled' : ''}">
                    <a class="page-link"
                       th:href="@{/statistics/goalies(season=${selectedSeason.id}, page=${currentPage + 1}, sortBy=${sortBy}, direction=${direction})}">
                        &raquo;
                    </a>
                </li>

            </ul>
        </nav>
        <p class="text-muted small mt-2">
            <i class="bi bi-info-circle"></i> Některé statistiky nemusí být ve starších sezónách zaznamenány.
        </p>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
