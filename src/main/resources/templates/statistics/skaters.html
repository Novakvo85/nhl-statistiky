<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="cs">
<head th:replace="~{fragments/layout :: head('Hráči')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">
    <div class="main-card mx-auto">
        <h1 class="mb-3 text-center"><i class="bi bi-person-fill"></i> Hráči v poli</h1>

        <form method="get" class="season-select mb-4">
            <label for="season" class="form-label"><i class="bi bi-calendar2-week"></i> Vyberte sezónu</label>
            <select id="season" name="season" class="form-select" onchange="this.form.submit()">
                <option th:each="s : ${seasons}"
                        th:value="${s.id}"
                        th:text="${s.startYear} + ' - ' + ${s.endYear}"
                        th:selected="${s.id == selectedSeason.id}">
                </option>
            </select>
            <input type="hidden" name="sortBy" th:value="${sortBy}">
            <input type="hidden" name="direction" th:value="${direction}">
        </form>

        <div th:if="${error}" class="alert alert-warning" th:text="${error}"></div>

        <div class="table-responsive" th:if="${players != null and !players.isEmpty()}">
            <table class="table table-hover align-middle">
                <thead class="table-primary">
                <tr>
                    <th>#</th>
                    <th>Hráč</th>
                    <th>Tým</th>

                    <th class="text-center" th:classappend="${sortBy == 'gamesPlayed' ? 'active-sort' : ''}">
                        <a th:href="@{/statistics/skaters(season=${selectedSeason.id}, page=0, sortBy='gamesPlayed',
                                direction=${sortBy == 'gamesPlayed' and direction == 'asc' ? 'desc' : (sortBy != 'gamesPlayed' ? 'desc' : 'asc')})}">
                            <span title="Zápasy">Z</span>
                            <i th:if="${sortBy == 'gamesPlayed'}"
                               th:classappend="${direction == 'asc' ? 'bi bi-arrow-up' : 'bi bi-arrow-down'}"></i>
                        </a>
                    </th>

                    <th class="text-center" th:classappend="${sortBy == 'goals' ? 'active-sort' : ''}">
                        <a th:href="@{/statistics/skaters(season=${selectedSeason.id}, page=0, sortBy='goals',
                                direction=${sortBy == 'goals' and direction == 'asc' ? 'desc' : (sortBy != 'goals' ? 'desc' : 'asc')})}">
                            <span title="Góly">G</span>
                            <i th:if="${sortBy == 'goals'}"
                               th:classappend="${direction == 'asc' ? 'bi bi-arrow-up' : 'bi bi-arrow-down'}"></i>
                        </a>
                    </th>

                    <th class="text-center" th:classappend="${sortBy == 'assists' ? 'active-sort' : ''}">
                        <a th:href="@{/statistics/skaters(season=${selectedSeason.id}, page=0, sortBy='assists',
                                direction=${sortBy == 'assists' and direction == 'asc' ? 'desc' : (sortBy != 'assists' ? 'desc' : 'asc')})}">
                            <span title="Asistence">A</span>
                            <i th:if="${sortBy == 'assists'}"
                               th:classappend="${direction == 'asc' ? 'bi bi-arrow-up' : 'bi bi-arrow-down'}"></i>
                        </a>
                    </th>

                    <th class="text-center" th:classappend="${sortBy == 'points' ? 'active-sort' : ''}">
                        <a th:href="@{/statistics/skaters(season=${selectedSeason.id}, page=0, sortBy='points',
                                direction=${sortBy == 'points' and direction == 'asc' ? 'desc' : (sortBy != 'points' ? 'desc' : 'asc')})}">
                            Body
                            <i th:if="${sortBy == 'points'}"
                               th:classappend="${direction == 'asc' ? 'bi bi-arrow-up' : 'bi bi-arrow-down'}"></i>
                        </a>
                    </th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="player, iterStat : ${players}">
                    <td th:text="${currentPage * 50 + iterStat.count}" class="text-muted"></td>
                    <td>
                        <a th:href="@{/players/{id}(id=${player.player.id})}"
                           class="text-decoration-none fw-semibold"
                           th:text="${player.player.firstName} + ' ' + ${player.player.lastName}">
                        </a>
                    </td>
                    <td>
                        <a th:if="${player.team != null}"
                           th:href="@{/teams/{id}(id=${player.team.id}, season=${selectedSeason.id})}"
                           class="text-decoration-none"
                           th:text="${player.team.name}">
                        </a>
                        <span th:if="${player.team == null}">-</span>
                    </td>
                    <td class="text-center" th:text="${player.gamesPlayed}"></td>
                    <td class="text-center" th:text="${player.goals}"></td>
                    <td class="text-center" th:text="${player.assists}"></td>
                    <td class="text-center fw-bold" th:text="${player.points}"></td>
                </tr>
                </tbody>
            </table>
        </div>

        <nav th:if="${totalPages > 1}" class="mt-3">
            <ul class="pagination justify-content-center flex-wrap">

                <li class="page-item" th:classappend="${currentPage == 0 ? 'disabled' : ''}">
                    <a class="page-link"
                       th:href="@{/statistics/skaters(season=${selectedSeason.id}, page=${currentPage - 1}, sortBy=${sortBy}, direction=${direction})}">
                        &laquo;
                    </a>
                </li>

                <li th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                    class="page-item"
                    th:classappend="${i == currentPage ? 'active' : ''}">
                    <a class="page-link"
                       th:href="@{/statistics/skaters(season=${selectedSeason.id}, page=${i}, sortBy=${sortBy}, direction=${direction})}"
                       th:text="${i + 1}">
                    </a>
                </li>

                <li class="page-item" th:classappend="${currentPage == totalPages - 1 ? 'disabled' : ''}">
                    <a class="page-link"
                       th:href="@{/statistics/skaters(season=${selectedSeason.id}, page=${currentPage + 1}, sortBy=${sortBy}, direction=${direction})}">
                        &raquo;
                    </a>
                </li>

            </ul>
        </nav>
        <p class="text-muted small mt-2">
            <i class="bi bi-info-circle"></i> Některé statistiky nemusí být ve starších sezónách zaznamenány.
        </p>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
